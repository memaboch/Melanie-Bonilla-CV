<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Melanie Bonilla — Marketing Strategist</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Montserrat',sans-serif;background:#faf7f2;color:#1a1a1a;margin:0}
nav{display:flex;justify-content:space-between;padding:20px 60px;background:#0d1f3c;color:white}
.stat-number{font-family:'Poppins',sans-serif;font-size:46px;font-weight:600;color:#c9922a}
.marquee-track{display:flex;animation:marquee 60s linear infinite;background:#0d1f3c;color:white;padding:14px 0}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.lang-btn{border:1px solid #c9922a;padding:6px 12px;margin-left:8px;background:white;cursor:pointer;font-size:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:60px;padding:120px}
</style>
</head>
<body>
<nav>
<div>Melanie Bonilla</div>
<div>
<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="setLang('es')">ES</button>
</div>
</nav>

<section class="grid">
<div>
<h1>Melanie Bonilla</h1>
<p id="lead">Senior Omnichannel Marketing Specialist</p>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:30px">
<div>
<div class="stat-number">85K+</div>
<div>Social media growth (5K → 85.5K)</div>
</div>
<div>
<div class="stat-number">42%</div>
<div>Above benchmark open rates (Vaccines HCP campaigns)</div>
</div>
<div>
<div class="stat-number">18%</div>
<div>CTR improvement vs benchmark</div>
</div>
<div>
<div class="stat-number">-32%</div>
<div>Bounce rate reduction</div>
</div>
</div>
</div>

<div>
<img src="Melanie Bonilla - pp.jpeg" style="width:100%;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.15)">
</div>
</section>

<div class="marquee-track" id="marqueeTrack"></div>

<script>
const en={lead:"Senior Omnichannel Marketing Manager with experience in Pharma, Fintech and AI automation."}
const es={lead:"Especialista Omnicanal Senior con experiencia en farma, fintech y automatización con IA."}
function setLang(l){document.getElementById('lead').innerText=(l==='es'?es:en).lead}

const items=['Salesforce Marketing Cloud','Veeva','AI Marketing','Omnichannel','Solve Fintech product launch success','HCP Campaign Performance','UX optimization','Growth Marketing'];
const track=document.getElementById('marqueeTrack');
track.innerHTML=[...items,...items].map(i=>`<span style="padding:0 40px">${i} ◆</span>`).join('');
</script>

</body>
</html>
